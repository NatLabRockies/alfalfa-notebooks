[tool.poetry]
name = "pacer-notebooks"
version = "1.0.0"
description = "Introductory Jupyter notebooks for interacting with a PACER (formerly Alfalfa) web service via the alfalfa-client Python library."
authors = ["Anya Petersen <anya.petersen@nrel.gov>"]
package-mode = false

[tool.poetry.dependencies]
python = ">=3.11"
alfalfa-client = "1.0.0"
jupyterlab = "^4.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
