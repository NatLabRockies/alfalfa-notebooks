name: Verify Pull Request Labeling
# Requires every PR to carry at least one categorization label so that
# GitHub's auto-generated release notes (configured in .github/release.yml)
# are grouped correctly. Modeled after
# https://github.com/SEED-platform/seed/blob/develop/.github/workflows/pr-labels.yml

on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize]

jobs:
  check_pr_labels:
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR label action
        uses: mheap/github-action-required-labels@v5
        with:
          mode: minimum
          count: 1
          labels: "breaking, enhancement, bug, dependencies, github_actions, python, documentation, add test, do not publish"
          add_comment: true
